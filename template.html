<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Lek's Blog</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .post-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid #dc143c;
            margin-bottom: 2rem;
        }
        
        .post-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #dc143c;
        }
        
        .post-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .post-meta span {
            margin: 0 0.5rem;
        }
        
        .post-content {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }
        
        .post-content h2 {
            color: #dc143c;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        
        .post-content h3 {
            color: #333;
            margin-top: 1.5rem;
        }
        
        .post-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
        }
        
        .post-content code {
            background: #f5f5f5;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Fira Code', monospace;
        }
        
        .post-content pre code {
            background: none;
            padding: 0;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #dc143c;
            text-decoration: none;
            font-weight: bold;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../blog.html" class="back-link">← Voltar ao Blog</a>
        
        <article class="post-header">
            <h1>{{title}}</h1>
            <div class="post-meta">
                <span>📅 {{date}}</span>
                <span>🏷️ {{tags}}</span>
                {{version}}
            </div>
        </article>
        
        <div class="post-content">
            {{content}}
        </div>
        
        <footer style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; text-align: center; color: #666;">
            <p>© 2026 Lek | Powered by Vercel</p>
            <script src="../script.js"></script>
        </footer>
    </div>
</body>
</html>
